<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found | IMS Security Services</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #e8192c;
      --gold: #f0c040;
      --dark: #12131f;
      --red-glow: rgba(232,25,44,0.45);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0d0e1f 0%, #1a0a1c 40%, #3a0010 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #fff;
      text-align: center;
      padding: 2rem;
    }

    /* Orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: float linear infinite;
    }
    .orb-1 { width:500px;height:500px;background:rgba(232,25,44,0.18);top:-150px;left:-150px;animation-duration:20s; }
    .orb-2 { width:350px;height:350px;background:rgba(139,0,70,0.15);bottom:-100px;right:-100px;animation-duration:25s;animation-delay:-10s; }
    @keyframes float {
      0%  { transform: translate(0,0) scale(1); }
      33% { transform: translate(30px,-40px) scale(1.1); }
      66% { transform: translate(-20px,25px) scale(.95); }
      100%{ transform: translate(0,0) scale(1); }
    }

    .content { position: relative; z-index: 2; max-width: 600px; }

    .err-num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--red), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      animation: glow-pulse 3s ease-in-out infinite;
      filter: drop-shadow(0 0 40px rgba(232,25,44,0.4));
    }
    @keyframes glow-pulse {
      0%,100% { filter: drop-shadow(0 0 30px rgba(232,25,44,0.35)); }
      50%      { filter: drop-shadow(0 0 60px rgba(232,25,44,0.6)); }
    }

    .shield {
      font-size: 3.5rem;
      margin: 1rem 0 1.5rem;
      animation: shield-spin 8s linear infinite;
      display: inline-block;
    }
    @keyframes shield-spin {
      0%,100% { transform: rotateY(0deg); }
      50%     { transform: rotateY(180deg); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 700;
      margin-bottom: 1rem;
      color: #fff;
    }

    p {
      color: rgba(255,255,255,0.65);
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, var(--red), var(--gold));
      margin: 1.2rem auto;
      border-radius: 3px;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      padding: .85rem 2.2rem;
      background: linear-gradient(135deg, var(--red), #b5111f);
      color: #fff;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 50px;
      box-shadow: 0 6px 28px var(--red-glow);
      transition: transform .2s, box-shadow .2s;
    }
    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(232,25,44,0.55);
    }
    .btn-home svg { width:18px;height:18px;fill:white; }

    .logo-bar {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Playfair Display', serif;
      font-size: .9rem;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      letter-spacing: .08em;
      z-index: 10;
    }
    .logo-bar span { color: var(--gold); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="logo-bar"><span>IMS</span> Security Services</div>

  <div class="content">
    <div class="err-num">404</div>
    <div class="shield">🛡️</div>
    <h1>Page Not Found</h1>
    <div class="divider"></div>
    <p>Oops! The page you're looking for has gone off-duty.<br>
    Let's get you back to our secure headquarters.</p>
    <a href="https://imsjsr.com" class="btn-home">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Back to Home
    </a>
  </div>
</body>
</html>
